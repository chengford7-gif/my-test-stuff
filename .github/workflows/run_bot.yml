name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Debug: List all files
      run: |
        echo "--- 📋 当前仓库文件树 ---"
        ls -R
        echo "--------------------------"

    - name: Install Dependencies
      run: |
        pip install requests pandas numpy matplotlib

    - name: Run Quantum Model Engine
      run: python catcher.py
      # 如果你的 catcher.py 不在根目录，请在这里加上工作目录路径，例如：
      # working-directory: ./子目录名
