name: IREN Price Catcher

on:
  schedule:
    # 意思是每 5 分钟自动运行一次（GitHub Action 定时触发有一定延迟，最短建议5分钟）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允许你在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖联网库
      run: |
        pip install requests

    - name: 运行监控脚本
      run: |
        python catcher

    - name: 自动把抓到的股价数据存回 GitHub 仓库
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add data_log.txt || true
        git commit -m "自动更新 IREN 股价数据" || true
        git push || true
