name: IREN Price Catcher

on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分钟全自动扫描一次
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 强制安装数学、网络与核心绘图依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: 运行形态学狙击脚本并注入微信密钥
      env:
        SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
      run: |
        python3 catcher

    - name: 自动将战报与实战走势图同步推回仓库
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data_log.txt iren_matrix.png || true
        git commit -m "自动更新近代形态学狙击雷达战报与核心走势图" || true
        git push
