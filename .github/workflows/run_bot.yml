name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每日自动定时刷新

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    # 1. 严格检出代码仓库
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 部署 Python 运行环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 💥 路径防错型依赖安装（直接合并升级，防止找不到 requirements.txt）
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "⚠️ 未在根目录找到 requirements.txt，执行核心库硬核静默安装..."
          pip install requests pandas numpy matplotlib
        fi

    # 4. 💥 执行核心策略跑图脚本（带工作目录保护）
    # 如果你的 catcher.py 在某个子文件里，请把下面的 ./ 改为对应的文件夹路径（例如 ./src）
    - name: Run Quantum Model Engine
      run: python catcher.py
      env:
        PYTHONUNBUFFERED: "1"

    # 5. 将生成的时空看板与红线图无情推流同步到 GitHub 仓库
    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add iren_quantum_v5.png README.md || true
        git commit -m "🤖 [Automated] Sync Quantum Matrix & Bearish Crash Plan" || echo "No changes to commit"
        git push
