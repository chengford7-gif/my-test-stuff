name: IREN Price Catcher

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装量子模型核心数学与绘图依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: 运行量子艾略特模型解构
      run: |
        python3 catcher

    - name: 自动将最新看板和复刻风格预测大图同步回仓库主页
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add README.md iren_matrix.png || true
        git commit -m "Quantum Model Projection: 自动同步最新的 TradingView 复刻风格时空看板" || true
        git push
