name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0点运行

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib numpy

    - name: Run Script
      run: |
        python catcher.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 添加文件，即使图片没变，README.md 的时间戳变了，git 也会提交
        git add iren_quantum_v5.png README.md
        
        # 提交更新
        git commit -m "Auto-Update: IREN Quantum Dashboard $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
