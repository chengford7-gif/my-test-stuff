name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: Run Script
      run: |
        python catcher.py
        # 这一步很重要：手动检查图片是否生成或更新
        echo "--- 📋 检查图片状态 ---"
        ls -lh iren_quantum_v5.png
        echo "-----------------------"

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 强制查看 Git 状态，这能告诉我它到底有没有检测到文件改动
        git status
        
        git add .
        # 如果没有改动，打印提示，而不是静默忽略
        git commit -m "Update Quantum Model Chart [Bot]" || echo "【诊断信息】Git 检测到没有文件变动，无需提交"
        git push
