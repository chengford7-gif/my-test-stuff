name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      # ⚠️ 必须在这里添加 yfinance
      run: |
        pip install requests pandas numpy matplotlib yfinance
        
    - name: Run Script
      run: |
        python catcher.py
        
    - name: Commit Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add iren_quantum_v5.png README.md
        git commit -m "Auto-Update Dashboard" || echo "No changes"
        git push
