name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 消除 Node.js 20 警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 明确安装 numpy 以确保科学计算基础库稳定
        pip install pandas matplotlib yfinance numpy requests
        
    - name: Run Script
      run: |
        python catcher.py
        
    - name: Commit Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add iren_quantum_v5.png README.md
        git commit -m "Auto-Update Dashboard $(date +'%Y-%m-%d')" || echo "No changes"
        git push
