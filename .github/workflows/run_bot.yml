name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Locate and Run Script
      run: |
        echo "--- 📋 当前目录结构 ---"
        find . -name "catcher.py"
        echo "--------------------------"
        
        # 自动获取 catcher.py 的真实路径并运行
        SCRIPT_PATH=$(find . -name "catcher.py" | head -n 1)
        if [ -z "$SCRIPT_PATH" ]; then
          echo "❌ 错误：在仓库中找不到 catcher.py"
          exit 1
        else
          echo "✅ 找到文件: $SCRIPT_PATH"
          python "$SCRIPT_PATH"
        fi
