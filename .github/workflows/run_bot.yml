name: IREN Price Catcher

on:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时全自动在后台更新一次首页
  workflow_dispatch: # 核心：允许你在手机 App 上随时随地手动点击按钮强制冲锋刷新

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 极速安装数学与核心绘图依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: 极速运行形态学狙击
      run: |
        python3 catcher

    - name: 自动将最新看板和预测图同步回仓库主页
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        # 💥 核心：将本地刷新的主页 README.md 和核心预测大图 iren_matrix.png 一起推回主仓库
        git add README.md iren_matrix.png || true
        git commit -m "自动更新近代形态学狙击雷达仓库首页看板" || true
        git push
