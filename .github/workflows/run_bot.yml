name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保这个权限在，这允许 GitHub Actions 修改仓库

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: Run Script
      run: |
        # 寻找并运行 catcher.py
        SCRIPT_PATH=$(find . -name "catcher.py" | head -n 1)
        python "$SCRIPT_PATH"

    # 新增：把生成的图片推回仓库
    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        # 这一步会添加所有更改的文件（比如你的图片）
        git add .
        # 如果有变动才提交，防止没有更新时报错
        git commit -m "Update Quantum Model Chart [Bot]" || echo "No changes to update"
        git push
