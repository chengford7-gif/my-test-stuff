name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 核心修复：在这里安装所有需要的库
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: Run Script
      run: |
        # 寻找并运行 catcher.py
        SCRIPT_PATH=$(find . -name "catcher.py" | head -n 1)
        if [ -f "$SCRIPT_PATH" ]; then
          echo "✅ 找到并运行: $SCRIPT_PATH"
          python "$SCRIPT_PATH"
        else
          echo "❌ 错误：找不到 catcher.py"
          exit 1
        fi
