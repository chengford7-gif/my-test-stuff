name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早8点运行

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    - name: Run Script
      run: |
        python catcher.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 强制添加这两个文件
        git add iren_quantum_v5.png README.md
        
        # 即使只有 README 时间变了，也能提交成功
        git commit -m "Auto-Update: IREN Quantum Dashboard $(date +'%Y-%m-%d %H:%M:%S')"
        git push
