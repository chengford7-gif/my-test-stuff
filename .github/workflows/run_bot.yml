name: Update IREN Quantum Model Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保有权限推送

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 显式安装核心依赖，不依赖 requirements.txt，防止文件找不到的问题
        pip install requests pandas numpy matplotlib
    
    - name: Run Quantum Model Engine
      run: python catcher.py
      # 这里不需要 env 额外设置，脚本内部已经处理了 Agg 模式
