name: Update IREN Quantum Model Dashboard

on:
  # 1. 允许你在 Actions 界面随时手动点击 "Run workflow" 强行刷新
  workflow_dispatch:
  
  # 2. 自动定时任务：每 6 小时在后台静默自动抓取数据并重绘看板
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予 Actions 写入和推送 README / 图片回仓库的最高权限

    steps:
    # 第一步：检出你的仓库代码
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 第二步：部署标准的 Python 3.10 生产环境
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-level: '3.10'
        cache: 'pip'

    # 第三步：极速安装量化跑图依赖组件
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy matplotlib

    # 第四步：物理清理历史残留旧图（彻底腾出空间，防止 Camo 混淆）
    - name: Purge Legacy Assets
      run: |
        rm -f iren_matrix.png
        rm -f iren_quantum_live.png

    # 第五步：雷霆出击！运行 catcher 脚本，生成新 README 并绘制带节点股价的橙色虚线图
    - name: Execute Quantum Matrix Catcher
      run: |
        python catcher

    # 第六步：💥 全资产追踪并强行推送回你的 GitHub 仓库主页
    - name: Commit and Push Terminal Updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Terminal"
        
        # 使用 -A 强行捕获文件更名、删除和全新生成的 iren_quantum_v3.png 资产
        git add -A
        
        # 即使这次价格没变、没有任何文件产生修改，也静默通过，绝不抛错
        git commit -m "🤖 Quantum Terminal: Synced Elliott Wave ⑤ orange tracks & prices" || echo "No changes to commit"
        
        # 轰油门推流
        git push
